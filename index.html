<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protokół Szkód Sadowniczych</title>
    <style>
        /* Wygląd aplikacji */
        body {
            font-family: sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
        }

        section {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        input[type="text"], 
        input[type="number"], 
        input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: #27ae60;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }

        button:active {
            background-color: #1e8449;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
            font-size: 14px;
        }

        input.table-input {
            width: 90%;
            margin: 0;
            padding: 8px;
        }

        .save-btn {
            background-color: #2980b9;
            margin-top: 20px;
            font-size: 20px;
            padding: 15px;
        }

        #preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        /* Ustawienia dla wydruku PDF */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            section {
                box-shadow: none;
                border: 1px solid #eee;
                page-break-inside: avoid;
            }
            button {
                display: none !important; /* Ukrywamy przyciski na wydruku */
            }
            input {
                border: none;
                border-bottom: 1px solid #000;
                border-radius: 0;
                padding: 4px;
                margin: 4px 0;
            }
        }
    </style>
</head>
<body>

    <h1>Protokół Szkód</h1>

    <section>
        <h2>1. Lokalizacja</h2>
        <button type="button" onclick="pobierzLokalizacje()">📍 Pobierz lokalizację GPS</button>
        <p style="font-size: 14px; color: #666;">Współrzędne: <span id="coords">Brak danych</span></p>
        
        <label>Numer działki (ULDK Geoportal):</label>
        <input type="text" id="dzialka" placeholder="Kliknij GPS, aby pobrać...">
    </section>

    <section>
        <h2>2. Dane Poszkodowanego</h2>
        <label>Imię i Nazwisko:</label>
        <input type="text" placeholder="Wpisz dane">
        
        <label>Adres zamieszkania:</label>
        <input type="text" placeholder="Wpisz adres">
        
        <label>Numer polisy:</label>
        <input type="text" placeholder="Wpisz numer">
    </section>

    <section>
        <h2>3. Zdjęcia z terenu</h2>
        <label>Zrób lub wybierz zdjęcia:</label>
        <input type="file" id="foto" accept="image/*" capture="camera" multiple>
        <div id="preview" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;"></div>
    </section>

    <section>
        <h2>4. Szczegóły szkody</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Działka</th>
                        <th>Uprawa</th>
                        <th>Pow. (ha)</th>
                        <th>% Uszkodzeń</th>
                        <th>Uwagi</th>
                    </tr>
                </thead>
                <tbody id="tabela-upraw">
                    <tr>
                        <td><input type="text" class="table-input"></td>
                        <td><input type="text" class="table-input"></td>
                        <td><input type="number" step="0.01" class="table-input"></td>
                        <td><input type="number" class="table-input"></td>
                        <td><input type="text" class="table-input"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button type="button" onclick="dodajWiersz()" style="background-color: #7f8c8d; margin-top: 15px;">+ Dodaj kolejny wiersz</button>
    </section>

    <button type="button" class="save-btn" onclick="window.print()">💾 GENERUJ RAPORT PDF</button>

    <!-- SKRYPTY JAVASCRIPT -->
    <script>
        // 1. Obsługa GPS i Geoportalu (ULDK)
        async function pobierzLokalizacje() {
            const poleStatusu = document.getElementById('coords');
            const poleDzialki = document.getElementById('dzialka');
            
            if (!navigator.geolocation) {
                poleStatusu.textContent = "Błąd: Brak GPS.";
                return;
            }

            poleStatusu.textContent = "Namierzam... 🛰️";
            poleDzialki.value = "Szukam numeru...";

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                poleStatusu.innerHTML = `Szer: ${lat.toFixed(6)}, Dł: ${lon.toFixed(6)}`;

                const url = `https://uldk.gugik.gov.pl/cgi-bin/demo?request=GetParcelByXY&xy=${lon},${lat}&result=teryt,region,commune,district,parcel`;

                try {
                    const response = await fetch(url);
                    const data = await response.text();

                    if (data.startsWith('0')) { 
                        // Sukces - bierzemy drugą linijkę z odpowiedzi serwera
                        const wynik = data.split('\n')[1]; 
                        poleDzialki.value = wynik; 
                    } else {
                        poleDzialki.value = "Nie znaleziono działki dla tych współrzędnych.";
                    }
                } catch (error) {
                    poleDzialki.value = "Błąd połączenia z Geoportalem.";
                }
            }, (error) => {
                poleStatusu.textContent = "Błąd odczytu GPS. Sprawdź uprawnienia.";
                poleDzialki.value = "";
            }, {
                enableHighAccuracy: true // Wymuszamy najdokładniejszy GPS
            });
        }

        // 2. Obsługa podglądu zdjęć
        document.getElementById('foto').addEventListener('change', function(e) {
            const preview = document.getElementById('preview');
            preview.innerHTML = ''; 
            
            Array.from(this.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        });

        // 3. Obsługa dodawania wierszy do tabeli
        function dodajWiersz() {
            const tabela = document.getElementById("tabela-upraw");
            const nowyWiersz = document.createElement("tr");

            nowyWiersz.innerHTML = `
                <td><input type="text" class="table-input"></td>
                <td><input type="text" class="table-input"></td>
                <td><input type="number" step="0.01" class="table-input"></td>
                <td><input type="number" class="table-input"></td>
                <td><input type="text" class="table-input"></td>
            `;

            tabela.appendChild(nowyWiersz);
        }
    </script>
</body>
</html>
